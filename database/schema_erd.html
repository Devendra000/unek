
<style>
#erd { padding: 1rem 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready; 
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  User {
    string id PK
    string email
    string username
    string avatarUrl
    datetime createdAt
  }
  Category {
    string id PK
    string name
    string slug
    string description
  }
  Source {
    string id PK
    string name
    SourceType sourceType
    string baseUrl
    string country
    boolean isActive
  }
  Tag {
    string id PK
    string name
    string slug
  }
  NewsArticle {
    string id PK
    string title
    string summary
    string originalUrl
    string author
    Language language
    string countryOfOrigin
    boolean isVerified
    datetime publishedAt
    string sourceId FK
    string categoryId FK
  }
  TrendingTopic {
    string id PK
    string title
    string summary
    int score
    int memeability
    TrendSource trendSource
    string[] memeIdeas
    json platformData
    datetime expiresAt
    string sourceId FK
    string categoryId FK
  }
  NewsTag {
    string newsArticleId FK
    string tagId FK
  }
  TrendTag {
    string trendingTopicId FK
    string tagId FK
  }
  Favorite {
    string id PK
    ContentType contentType
    string userId FK
    string newsArticleId FK
    string trendingTopicId FK
  }

  User ||--o{ Favorite : "has"
  Favorite }o--o| NewsArticle : "references"
  Favorite }o--o| TrendingTopic : "references"
  Source ||--o{ NewsArticle : "provides"
  Source ||--o{ TrendingTopic : "provides"
  Category ||--o{ NewsArticle : "classifies"
  Category ||--o{ TrendingTopic : "classifies"
  NewsArticle ||--o{ NewsTag : "has"
  Tag ||--o{ NewsTag : "used in"
  TrendingTopic ||--o{ TrendTag : "has"
  Tag ||--o{ TrendTag : "used in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
