# version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: unek_postgres
    restart: always
    environment:
      POSTGRES_DB: unek_db
      POSTGRES_USER: unek_user
      POSTGRES_PASSWORD: password
    ports:
      - "3051:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - unek_network

  redis:
    image: redis:7-alpine
    container_name: unek_redis
    restart: always
    ports:
      - "3052:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - unek_network

  adminer:
    image: adminer
    restart: always
    ports:
      - "3053:8080"
    networks:
      - unek_network

volumes:
  pgdata:
  redis_data:

networks:
  unek_network:
    driver: bridge
